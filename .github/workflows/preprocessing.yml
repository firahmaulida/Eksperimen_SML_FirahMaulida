name: Preprocessing Pipeline - Telco Customer Churn

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    name: Run Preprocessing Script
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout Repository
      # -----------------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Python 3.12.7
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # -----------------------------------------------------------------------
      # 3. Cache pip dependencies
      # -----------------------------------------------------------------------
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # -----------------------------------------------------------------------
      # 4. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 5. Verify dataset exists
      # -----------------------------------------------------------------------
      - name: Verify dataset file
        run: |
          echo "Memeriksa keberadaan file dataset..."
          ls -lh namadataset_raw/
          echo "Dataset ditemukan!"

      # -----------------------------------------------------------------------
      # 6. Run preprocessing script
      # -----------------------------------------------------------------------
      - name: Run automate_FirahMaulida.py
        run: |
          echo "Menjalankan pipeline preprocessing..."
          cd preprocessing
          python automate_FirahMaulida.py
          echo "Pipeline selesai!"

      # -----------------------------------------------------------------------
      # 7. Verify output
      # -----------------------------------------------------------------------
      - name: Verify output file
        run: |
          echo "Memeriksa file output hasil preprocessing..."
          ls -lh preprocessed_output/
          echo "Menampilkan 5 baris pertama hasil preprocessing:"
          python -c "
          import pandas as pd
          df = pd.read_csv('preprocessed_output/telco_churn_preprocessed.csv')
          print(f'Shape: {df.shape}')
          print(df.head())
          "

      # -----------------------------------------------------------------------
      # 8. Upload preprocessed data as artifact
      # -----------------------------------------------------------------------
      - name: Upload Preprocessed Data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-telco-churn-${{ github.run_number }}
          path: |
            preprocessed_output/telco_churn_preprocessed.csv
            preprocessing/preprocessing.log
          retention-days: 30

      # -----------------------------------------------------------------------
      # 9. Upload log file as artifact
      # -----------------------------------------------------------------------
      - name: Upload Preprocessing Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preprocessing-log-${{ github.run_number }}
          path: preprocessing/preprocessing.log
          retention-days: 14
